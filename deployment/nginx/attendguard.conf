# Nginx reverse proxy: terminates HTTP on port 80 and forwards to gunicorn
# listening on 127.0.0.1:8000. Add a TLS server block here (e.g. via
# certbot) once you attach a domain name to the instance.

server {
    listen 80;
    server_name _;

    client_max_body_size 5M;

    location /static/ {
        alias /home/ubuntu/attendguard/app/static/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
