version: 0.0
# CodeDeploy application spec: deploys the build artifact to the EC2
# instance and drives it through stop -> install -> start -> validate.

os: linux

files:
  - source: /
    destination: /home/ubuntu/attendguard
    overwrite: true

permissions:
  - object: /home/ubuntu/attendguard
    owner: ubuntu
    group: ubuntu
    mode: '755'
    type:
      - directory
      - file

hooks:
  ApplicationStop:
    - location: deployment/scripts/application_stop.sh
      timeout: 60
      runas: root
  BeforeInstall:
    - location: deployment/scripts/install_dependencies.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: deployment/scripts/application_start.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: deployment/scripts/validate_service.sh
      timeout: 60
      runas: root
